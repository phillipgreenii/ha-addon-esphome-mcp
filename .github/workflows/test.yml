name: tests

on:
  push:
    branches: [main, security-hardening]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest -v

  lockfile-drift:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64]
        include:
          - arch: amd64
            platform: x86_64-unknown-linux-musl
          - arch: aarch64
            platform: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - name: Recompile ${{ matrix.arch }}
        run: |
          uv pip compile esphome-mcp/requirements.txt.in \
            --generate-hashes \
            --python-version 3.12 \
            --python-platform ${{ matrix.platform }} \
            -o /tmp/regen.lock
      - name: Diff
        run: |
          # Skip the autogenerated header (lines 1-2) which embeds the
          # absolute path of the input/output files — that path differs
          # between local regeneration and CI's runner workspace, but the
          # resolved deps and hashes are what we actually want to check.
          diff <(tail -n +3 esphome-mcp/requirements.${{ matrix.arch }}.lock) \
               <(tail -n +3 /tmp/regen.lock) \
            || (echo "::error::requirements.${{ matrix.arch }}.lock is stale" && exit 1)

  addon-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: frenck/action-addon-linter@v2
        with:
          path: ./esphome-mcp

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: esphome-mcp/Dockerfile

  # End-to-end boot smoke test: builds the addon image against the real HA
  # base-python image and asserts /health responds 200 within 60s. This is
  # the test that would have caught the 1.1.x release regressions (custom
  # apparmor profile vs s6-overlay layout, `init: false` missing, mcp
  # transport_security version-pin mismatch, ESPHOME_MCP_AUTH_TOKEN
  # fail-closed) — none of which any unit test could observe.
  smoke-boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build addon image (amd64)
        run: |
          docker build \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.21 \
            --build-arg BUILD_ARCH=amd64 \
            -t esphome-mcp:smoke \
            esphome-mcp

      # run.sh reads addon settings via `bashio::config` from
      # /data/options.json (Supervisor writes this at runtime). Outside
      # Supervisor, we provide it ourselves so bashio doesn't fail and so
      # the container doesn't try to auto-generate a token into /data.
      - name: Provide minimal Supervisor options
        run: |
          mkdir -p /tmp/ci-data
          cat > /tmp/ci-data/options.json <<'EOF'
          {
            "auth_token": "ci-smoke-test",
            "compile_enabled": false,
            "flash_enabled": false,
            "max_concurrent_compiles": 1,
            "max_body_mb": 8,
            "max_file_mb": 1
          }
          EOF

      - name: Start container
        run: |
          docker run -d \
            --name esphome-mcp-smoke \
            -p 8099:8099 \
            -v /tmp/ci-data:/data \
            esphome-mcp:smoke

      - name: Wait for /health to return 200 (<60s)
        run: |
          deadline=$(( $(date +%s) + 60 ))
          last_status=""
          while (( $(date +%s) < deadline )); do
            last_status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8099/health || echo "curl-error")
            if [[ "$last_status" == "200" ]]; then
              elapsed=$(( $(date +%s) - (deadline - 60) ))
              echo "✓ /health returned 200 after ${elapsed}s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::/health did not return 200 within 60s (last status: ${last_status})"
          exit 1

      - name: Container logs on failure
        if: failure()
        run: docker logs esphome-mcp-smoke || true

      - name: Cleanup
        if: always()
        run: docker rm -f esphome-mcp-smoke || true
