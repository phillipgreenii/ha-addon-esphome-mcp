name: tests

on:
  push:
    branches: [main, security-hardening]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest -v

  lockfile-drift:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64]
        include:
          - arch: amd64
            platform: x86_64-unknown-linux-musl
          - arch: aarch64
            platform: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - name: Recompile ${{ matrix.arch }}
        run: |
          uv pip compile esphome-mcp/requirements.txt.in \
            --generate-hashes \
            --python-version 3.12 \
            --python-platform ${{ matrix.platform }} \
            -o /tmp/regen.lock
      - name: Diff
        run: |
          diff esphome-mcp/requirements.${{ matrix.arch }}.lock /tmp/regen.lock \
            || (echo "::error::requirements.${{ matrix.arch }}.lock is stale" && exit 1)

  addon-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: frenck/action-addon-linter@v2
        with:
          path: ./esphome-mcp

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: esphome-mcp/Dockerfile
