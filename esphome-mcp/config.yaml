# Supervisor defaults assumed for security-relevant keys (omitted because
# the addon-linter rejects keys set to their schema default):
#
#   host_network: false        — no host-network namespace
#   homeassistant_api: false   — no HA Core REST proxy
#   hassio_api: false          — no Supervisor API access
#   privileged: []             — no Linux capabilities
#   full_access: false         — no /dev passthrough
#   devices: []                — no device passthrough
#   ingress_port: 8099         — what Supervisor's ingress proxies to
#   startup: application       — start after HA Core
#   boot: auto                 — start with HA on boot
#
name: ESPHome MCP Server
version: 1.1.6
slug: esphome-mcp
# s6-overlay v3 (provided by ghcr.io/home-assistant/*-base-python) needs
# to BE PID 1 to run its supervision tree. With the Supervisor default
# `init: true`, tini is injected as PID 1, so s6-overlay-suexec aborts
# with `fatal: can only run as pid 1`. Disable Supervisor's init shim
# because we use s6-overlay as the in-container init.
init: false
description: >-
  MCP (Model Context Protocol) server exposing ESPHome operations as tools
  for Claude Code. Runs ESPHome commands locally on Home Assistant.
url: https://github.com/phillipgreenii/ha-addon-esphome-mcp
arch:
  - aarch64
  - amd64
# ingress is the default transport; HA's ingress proxy provides TLS + login.
# Direct port 8099 access is OFF by default — set `ports:` back if you need
# LAN access AND have a TLS-terminating proxy.
ingress: true
ingress_entry: /mcp
# Narrower than `config:rw` — we only need our own slice of /share.
map:
  - type: share
    read_only: false
# NOTE on Supervisor watchdog: the YAML `watchdog:` key is rejected by
# the addon-linter ("obsolete. Use the native Docker HEALTHCHECK
# directive instead"). Liveness comes from the Dockerfile HEALTHCHECK.
# Without the YAML key, Supervisor still surfaces an "Unhealthy" badge
# on container HEALTHCHECK failure, but operators must enable the addon's
# "Watchdog" toggle in the HA UI for automatic restart on unhealthy.
# See DOCS.md "Recommended deployment" for the one-click step.
options:
  auth_token: ""
  compile_enabled: false
  flash_enabled: false
  max_concurrent_compiles: 1
  max_body_mb: 8
  max_file_mb: 1
schema:
  auth_token: password
  compile_enabled: bool
  flash_enabled: bool
  max_concurrent_compiles: int(1,8)
  max_body_mb: int(1,64)
  max_file_mb: int(1,16)
